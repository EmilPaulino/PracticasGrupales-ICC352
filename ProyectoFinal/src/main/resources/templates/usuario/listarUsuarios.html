<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestión de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>

<body>

<div th:replace="~{templates/fragments/navbar.html :: navbar(true)}"></div>
<div th:replace="~{templates/fragments/sidebar.html :: sidebar}"></div>

<div id="sidebarOverlay"></div>

<main class="main-content">

    <div class="container-fluid">

        <div class="card shadow-sm border-0">

            <div class="card-header bg-white border-0 py-3">

                <div class="d-flex justify-content-between align-items-center">
                    <h4 class="mb-0 fw-semibold">
                        Gestión de Usuarios
                    </h4>

                    <a class="btn btn-success btn-sm"th:href="@{/admin/usuarios/formulario/crear}">
                        <i class="bi bi-plus-lg"></i>
                        Nuevo usuario
                    </a>
                </div>

            </div>

            <div class="table-responsive">

                <table class="table table-hover align-middle mb-0">

                    <thead class="table-light">

                    <tr>
                        <th class="ps-4">Usuario</th>
                        <th>Nombre</th>
                        <th>Rol</th>
                        <th class="text-center pe-4">Acciones</th>
                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="u : ${usuarios}">

                        <td class="ps-4 fw-medium" th:text="${u.username}"></td>

                        <td th:text="${u.nombre}"></td>

                        <td>
                            <span class="badge rounded-pill bg-primary"th:text="${u.rol}"></span>
                        </td>

                        <td class="text-center pe-4">

                            <div class="btn-group btn-group-sm">

                                <a class="btn btn-outline-primary"
                                   th:href="@{/admin/usuarios/formulario/editar/{id}(id=${u.idString})}"
                                   title="Editar usuario">
                                    <i class="bi bi-pencil"></i>
                                </a>

                                <button class="btn btn-outline-danger"
                                        title="Eliminar usuario"
                                        data-bs-toggle="modal"
                                        data-bs-target="#modalEliminar"
                                        th:data-id="${u.idString}"
                                        th:data-nombre="${u.nombre}">
                                    <i class="bi bi-trash"></i>
                                </button>

                            </div>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="4" class="text-center text-muted py-4">
                            No hay usuarios registrados
                        </td>
                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</main>

<!-- MODAL ELIMINAR -->

<div class="modal fade"
     id="modalEliminar"
     tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header border-0">
                <h5 class="modal-title fw-semibold">Eliminar usuario</h5>
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>
            </div>

            <div class="modal-body">
                ¿Estás seguro que deseas eliminar a
                <strong id="modalNombreUsuario"></strong>?

            </div>

            <div class="modal-footer border-0">

                <button type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    Cancelar
                </button>

                <a id="modalBtnEliminar"
                   href="#"
                   class="btn btn-danger">
                    <i class="bi bi-trash me-1"></i>
                    Eliminar
                </a>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/layout.js}"></script>

<script>

    const modalEliminar = document.getElementById('modalEliminar');

    modalEliminar.addEventListener('show.bs.modal', event => {

        const btn    = event.relatedTarget;
        const id     = btn.getAttribute('data-id');
        const nombre = btn.getAttribute('data-nombre');

        document.getElementById('modalNombreUsuario').textContent = nombre;
        document.getElementById('modalBtnEliminar').href = '/admin/usuarios/eliminar/' + id;

    });

</script>

</body>

</html>
