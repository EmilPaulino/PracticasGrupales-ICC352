<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${modo=='editar'} ? 'Editar Usuario' : 'Nuevo Usuario'">Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>

<body>

<div th:replace="~{templates/fragments/navbar.html :: navbar(true)}"></div>
<div th:replace="~{templates/fragments/sidebar.html :: sidebar}"></div>

<div id="sidebarOverlay"></div>

<main class="main-content">

    <div class="container-fluid">

        <div class="card shadow-sm border-0">

            <!-- HEADER -->

            <div class="card-header bg-white border-0 py-3">

                <h4 class="mb-0 fw-semibold"
                    th:text="${modo=='editar'} ? 'Editar Usuario' : 'Nuevo Usuario'">
                </h4>

            </div>

            <!-- BODY -->

            <div class="card-body">

                <!-- Error si ya existe el usuario que se esta creando -->
                <div th:if="${error == 'existe'}"
                     class="alert alert-danger d-flex align-items-center gap-2"
                     role="alert">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span>Este nombre de usuario ya existe</span>
                </div>

                <form method="post" th:with="accion=${modo=='editar'} ? '/admin/usuarios/actualizar' : '/admin/usuarios/crear'" th:action="${accion}">
                    <!-- ID oculto para poder editar -->
                    <input type="hidden" name="id" th:value="${usuario != null ? usuario.idString : ''}">

                    <div class="row g-3">

                        <div class="col-12">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" name="username" required th:value="${usuario != null ? usuario.username : ''}" th:disabled="${modo=='editar'}">
                        </div>

                        <div class="col-12">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" name="nombre" required th:value="${usuario != null ? usuario.nombre : ''}">
                        </div>

                        <div class="col-12">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="password">
                        </div>

                        <div class="col-12">
                            <label class="form-label">Rol</label>
                            <select class="form-select" name="rol" required>
                                <option value="">Seleccione un rol</option>
                                <option value="ADMIN" th:selected="${usuario != null and usuario.rol.toString() == 'ADMIN'}">Administrador</option>
                                <option value="ENCUESTADOR" th:selected="${usuario != null and usuario.rol.toString() == 'ENCUESTADOR'}">Encuestador</option>
                            </select>
                        </div>

                    </div>

                    <hr class="my-4">

                    <div class="d-flex justify-content-end gap-2">
                        <a href="/admin/usuarios" class="btn btn-secondary">Cancelar</a>

                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i>
                            Guardar
                        </button>
                    </div>

                </form>

            </div>

        </div>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/layout.js}"></script>

</body>

</html>
