<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Encuestas OP — Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/login.css}" rel="stylesheet"/>
    <link th:href="@{/css/layout.css}" rel="stylesheet"/>
</head>

<body>

<div th:replace="~{templates/fragments/navbar.html :: navbar}"></div>

<div class="login-card card mx-auto mt-5">

    <div class="login-header">

        <div class="d-flex align-items-center gap-3 mb-3">

            <img th:src="@{/imgs/logoPucmm.png}" width="100" height="100"/>

            <div class="text-white">
                <div class="fw-bold fs-5">
                    PUCMM
                </div>

                <div class="fs-5 opacity-75">
                    Oficina de Planeamiento
                </div>
            </div>

        </div>

        <hr class="my-3"/>

        <h4 class="text-center fw-semibold mb-0">Iniciar Sesión</h4>
    </div>

    <div class="login-body">

        <!-- Mensaje de error por credenciales invalidas -->
        <div th:if="${error}"
             class="alert alert-danger d-flex align-items-center gap-2 mb-3"
             role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span>Usuario o contraseña incorrectos</span>
        </div>


        <form method="post" action="/login">
            <div class="mb-3">
                <label class="form-label fw-medium">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text">
                    <i class="bi bi-person"></i>
                    </span>

                    <input type="text" class="form-control" name="username" required/>
                </div>

            </div>

            <div class="mb-3">
                <label class="form-label fw-medium">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                    </span>

                    <input type="password" class="form-control" name="password" id="password" required/>

                    <button class="btn btn-outline-secondary" type="button" id="togglePw">
                        <i class="bi bi-eye"
                           id="eyeIcon">
                        </i>
                    </button>
                </div>

            </div>

            <div class="mb-3 d-flex justify-content-between align-items-center">

                <div class="form-check">
                    <input type="checkbox"
                           class="form-check-input"
                           name="remember"
                           id="rememberMe"/>
                    <label class="form-check-label" for="rememberMe">
                        Recuérdame
                    </label>
                </div>

            </div>

            <button type="submit" class="btn btn-primary w-100">Ingresar</button>

        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

<!-- Mostrar / ocultar password -->
<script>
    const p = document.getElementById("password");
    const tp = document.getElementById("togglePw");
    const ei = document.getElementById("eyeIcon");
    tp.addEventListener("click", () => {
        const m = p.type === "password";
        p.type = m ? "text" : "password";
        ei.className = m ? "bi bi-eye-slash" : "bi bi-eye";
    });
</script>

</body>

</html>
