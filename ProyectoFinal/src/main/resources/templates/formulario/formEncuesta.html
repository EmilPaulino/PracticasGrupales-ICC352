<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario de Encuesta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>

<body>

<div th:replace="~{templates/fragments/navbar.html :: navbar(false)}"></div>

<main class="container mt-10">

    <div class="card shadow-sm border-0" style="margin-top: 100px">

        <div class="card-header bg-white border-0 py-3">

            <h4 class="mb-0 fw-semibold" id="tituloFormulario">
                Formulario de Encuesta
            </h4>

        </div>

        <div class="card-body">

            <form id="formEncuesta">

                <div class="row g-3">

                    <div class="col-12">
                        <label class="form-label">Nombre</label>
                        <input id="nombre" class="form-control" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Sector</label>
                        <input id="sector" class="form-control" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Nivel Escolar</label>
                        <select id="nivelEscolar"class="form-select">
                            <option value="BASICO">Básico</option>
                            <option value="MEDIO">Medio</option>
                            <option value="GRADO_UNIVERSITARIO">Grado Universitario</option>
                            <option value="POSTGRADO">Postgrado</option>
                            <option value="DOCTORADO">Doctorado</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Foto</label>
                        <div class="border rounded p-3 text-center">
                            <div style="max-width:300px;margin:auto;">
                                <video id="video"
                                       class="w-100 rounded mb-2"
                                       style="display:none;"
                                       playsinline>
                                </video>

                                <img id="preview"
                                     class="img-fluid rounded mb-2"
                                     style="display:none;">
                            </div>

                            <div class="d-flex justify-content-center gap-2 flex-wrap">
                                <button type="button" class="btn btn-outline-primary btn-sm" onclick="activarCamara()">
                                    <i class="bi bi-camera-video"></i>
                                    Activar
                                </button>

                                <button type="button" class="btn btn-outline-danger btn-sm" onclick="desactivarCamara()">
                                    <i class="bi bi-camera-video-off"></i>
                                    Apagar
                                </button>

                                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="tomarFoto()">
                                    <i class="bi bi-camera"></i>
                                    Capturar
                                </button>
                            </div>

                            <canvas id="canvas" style="display:none;"></canvas>

                        </div>

                    </div>

                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-end gap-2">
                    <a href="/formularios" class="btn btn-secondary">
                        Cancelar
                    </a>

                    <button class="btn btn-primary">
                        <i class="bi bi-save"></i>
                        Guardar
                    </button>
                </div>

            </form>

        </div>

    </div>

</main>


<div class="modal fade" id="modalMensaje" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header border-0">
                <h5 class="modal-title fw-semibold" id="modalTitulo">
                    Mensaje
                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>
            </div>


            <div class="modal-body" id="modalTexto">
                Texto del mensaje
            </div>


            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    Cerrar
                </button>
            </div>

        </div>

    </div>

</div>

<script src="/js/formulario-model.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
