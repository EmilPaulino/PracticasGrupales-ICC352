<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Detalle del Formulario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/layout.css}">

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<body>

<div th:replace="~{templates/fragments/navbar.html :: navbar(true)}"></div>
<div th:replace="~{templates/fragments/sidebar.html :: sidebar}"></div>

<div id="sidebarOverlay"></div>

<main class="main-content">

    <div class="container-fluid">

        <div class="card shadow-sm border-0">

            <div class="card-header bg-white border-0 py-3">

                <h4 class="mb-0 fw-semibold">

                    Detalle del Formulario

                </h4>

            </div>

            <div class="card-body">

                <div class="row g-3">

                    <div class="col-12">

                        <label class="form-label fw-semibold">
                            Nombre
                        </label>

                        <input type="text"
                               class="form-control"
                               th:value="${formulario.nombre}"
                               disabled>

                    </div>

                    <div class="col-12">

                        <label class="form-label fw-semibold">
                            Sector
                        </label>

                        <input type="text"
                               class="form-control"
                               th:value="${formulario.sector}"
                               disabled>

                    </div>

                    <div class="col-12">

                        <label class="form-label fw-semibold">
                            Nivel Escolar
                        </label>

                        <input type="text"
                               class="form-control"
                               th:value="${formulario.nivelEscolar}"
                               disabled>

                    </div>

                    <div class="col-12">

                        <label class="form-label fw-semibold">
                            Encuestador
                        </label>

                        <input type="text"
                               class="form-control"
                               th:value="${formulario.usuario.username}"
                               disabled>

                    </div>

                    <div class="col-12">

                        <label class="form-label fw-semibold">
                            Fecha Registro
                        </label>

                        <input type="text"
                               class="form-control"
                               th:value="${#dates.format(formulario.fechaRegistro,'dd/MM/yyyy HH:mm')}"
                               disabled>

                    </div>

                    <div class="col-12 text-center mt-3">

                        <label class="form-label fw-semibold d-block">
                            Foto capturada
                        </label>

                        <img th:src="${formulario.fotoBase64}"
                             class="img-fluid rounded shadow-sm"
                             style="max-height:280px;">

                    </div>

                    <div class="col-12 text-center mt-3">

                        <label class="form-label fw-semibold d-block">
                            Ubicación
                        </label>

                        <div id="map"
                             style="height:300px;">
                        </div>

                    </div>

                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-end">

                    <a href="/admin/formularios"
                       class="btn btn-secondary">

                        <i class="bi bi-arrow-left"></i>

                        Volver

                    </a>

                </div>

            </div>

        </div>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script th:src="@{/js/layout.js}"></script>

<script th:inline="javascript">

    var latitud  = /*[[${formulario.ubicacion.latitud}]]*/ null;
    var longitud = /*[[${formulario.ubicacion.longitud}]]*/ null;

</script>

<script>

    document.addEventListener("DOMContentLoaded", function () {

        if(latitud !== null && longitud !== null){

            var map = L.map('map')
                .setView([latitud, longitud], 16);

            L.tileLayer(
                'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
            ).addTo(map);

            L.marker([latitud, longitud])
                .addTo(map)
                .bindPopup("Ubicación del formulario")
                .openPopup();

        } else {

            document.getElementById("map").innerHTML =
                "<p style='color:red'>No hay ubicación registrada</p>";

        }

    });

</script>

</body>

</html>
