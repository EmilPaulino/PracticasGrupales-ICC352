<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mis Formularios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>

<body>

<div th:replace="~{templates/fragments/navbar.html :: navbar}"></div>

<main class="container mt-4">

    <div id="alertaSync" class="alert d-none mb-3" role="alert"></div>

    <div class="card shadow-sm border-0">

        <div class="card-header bg-white border-0 py-3">
            <div class="d-flex justify-content-between align-items-center">

                <h4 class="mb-0 fw-semibold">Mis Formularios</h4>

                <div class="d-flex gap-2">
                    <button class="btn btn-success btn-sm" id="btnSincronizar" onclick="sincronizarTodos()">
                        <i class="bi bi-cloud-upload me-1"></i>Sincronizar
                    </button>

                    <a class="btn btn-primary btn-sm" th:href="@{/formularios/crear}">
                        <i class="bi bi-plus-lg me-1"></i>Nuevo
                    </a>
                </div>
            </div>
        </div>

        <div class="card-body">

            <ul class="nav nav-tabs">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#pendientes">
                        <i class="bi bi-clock-history me-1"></i>Pendientes
                        <span class="badge bg-warning text-dark ms-1" id="contadorPendientes">0</span>
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#sincronizados">
                        <i class="bi bi-cloud-check me-1"></i>Sincronizados
                    </button>
                </li>
            </ul>

            <div class="tab-content mt-3">

                <div class="tab-pane fade show active" id="pendientes">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                            <tr>
                                <th class="ps-4">Nombre</th>
                                <th>Sector</th>
                                <th>Nivel Escolar</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                            </thead>
                            <tbody id="tablaLocales"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Tab Sincronizados -->
                <div class="tab-pane fade" id="sincronizados">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                            <tr>
                                <th class="ps-4">Nombre</th>
                                <th>Sector</th>
                                <th>Nivel Escolar</th>
                                <th>Fecha Registro</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="f : ${formulariosSync}">
                                <td class="ps-4 fw-medium" th:text="${f.nombre}"></td>
                                <td th:text="${f.sector}"></td>
                                <td th:text="${f.nivelEscolar}"></td>
                                <td th:text="${#dates.format(f.fechaRegistro,'dd/MM/yyyy')}"></td>
                                <td class="text-center">
                                    <a class="btn btn-outline-primary btn-sm"
                                       th:href="@{/formularios/ver/{id}(id=${f.id})}">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(formulariosSync)}">
                                <td colspan="5" class="text-center text-muted py-4">
                                    No hay formularios sincronizados
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

=<div class="modal fade" id="modalEliminar" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-semibold">Eliminar formulario</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">¿Estás seguro que deseas eliminar este formulario pendiente?</div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-danger" id="btnConfirmarEliminar">
                    <i class="bi bi-trash me-1"></i>Eliminar
                </button>
            </div>
        </div>
    </div>
</div>

=<div class="modal fade" id="modalMensaje" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-semibold" id="modalTitulo">Mensaje</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalTexto"></div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
    const USERNAME = /*[[${username}]]*/ "";
</script>

<script>

    let eliminarIndex = null;
    let workerActivo  = null;

    function mostrarAlerta(texto, tipo = "info") {
        const alerta = document.getElementById("alertaSync");
        alerta.className = `alert alert-${tipo}`;
        alerta.textContent = texto;
        alerta.classList.remove("d-none");
        setTimeout(() => alerta.classList.add("d-none"), 4000);
    }

    function mostrarModal(titulo, texto) {
        document.getElementById("modalTitulo").textContent = titulo;
        document.getElementById("modalTexto").textContent  = texto;
        new bootstrap.Modal(document.getElementById("modalMensaje")).show();
    }

    function setBtnSincronizando(cargando) {
        const btn = document.getElementById("btnSincronizar");
        if (cargando) {
            btn.disabled  = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm me-1"></span>Sincronizando...`;
        } else {
            btn.disabled  = false;
            btn.innerHTML = `<i class="bi bi-cloud-upload me-1"></i>Sincronizar`;
        }
    }

    function cargarLocales() {
        const lista    = JSON.parse(localStorage.getItem("formularios")) || [];
        const tabla    = document.getElementById("tablaLocales");
        const contador = document.getElementById("contadorPendientes");

        tabla.innerHTML      = "";
        contador.textContent = lista.length;

        if (lista.length === 0) {
            tabla.innerHTML = `
            <tr>
              <td colspan="4" class="text-center text-muted py-4">
                No hay formularios pendientes
              </td>
            </tr>`;
            return;
        }

        lista.forEach((f, index) => {
            const fila = document.createElement("tr");
            fila.innerHTML = `
                <td class="ps-4 fw-medium">${f.nombre || "Sin nombre"}</td>
                <td>${f.sector || "-"}</td>
                <td>${f.nivelEscolar || "-"}</td>
                <td class="text-center">
                  <div class="btn-group btn-group-sm">
                    <button class="btn btn-outline-secondary" onclick="editar(${index})" title="Editar">
                      <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-outline-danger" onclick="abrirModalEliminar(${index})" title="Eliminar">
                      <i class="bi bi-trash"></i>
                    </button>
                  </div>
                </td>`;
            tabla.appendChild(fila);
        });
    }

    cargarLocales();

    function abrirModalEliminar(index) {
        eliminarIndex = index;
        new bootstrap.Modal(document.getElementById("modalEliminar")).show();
    }

    document.getElementById("btnConfirmarEliminar").addEventListener("click", () => {
        const lista = JSON.parse(localStorage.getItem("formularios")) || [];
        lista.splice(eliminarIndex, 1);
        localStorage.setItem("formularios", JSON.stringify(lista));
        bootstrap.Modal.getInstance(document.getElementById("modalEliminar")).hide();
        cargarLocales();
        mostrarAlerta("Formulario eliminado", "warning");
    });

    function editar(index) {
        localStorage.setItem("editarIndex", index);
        window.location.href = "/formularios/editar";
    }

    function sincronizarTodos() {

        const lista = JSON.parse(localStorage.getItem("formularios")) || [];

        if (lista.length === 0) {
            mostrarModal("Aviso", "No hay formularios pendientes para sincronizar.");
            return;
        }

        if (!USERNAME) {
            mostrarModal("Error", "No se pudo identificar tu sesión. Recarga la página.");
            return;
        }

        if (workerActivo) {
            workerActivo.terminate();
            workerActivo = null;
        }

        setBtnSincronizando(true);

        workerActivo = new Worker("/js/sync-worker.js");

        const payload = {
            username:    USERNAME,
            formularios: lista
        };

        workerActivo.postMessage(payload);

        const timeoutGlobal = setTimeout(() => {
            if (workerActivo) {
                workerActivo.terminate();
                workerActivo = null;
            }
            setBtnSincronizando(false);
            mostrarAlerta("Tiempo de espera agotado. Verifica tu conexión.", "danger");
        }, 15000);

        workerActivo.onmessage = function (e) {
            clearTimeout(timeoutGlobal);
            setBtnSincronizando(false);
            workerActivo = null;

            if (e.data === "OK") {
                localStorage.removeItem("formularios");
                mostrarAlerta(`${lista.length} formulario(s) sincronizados correctamente.`, "success");
                setTimeout(() => location.reload(), 1500);
            } else {
                mostrarAlerta("Error al sincronizar. Intenta nuevamente.", "danger");
            }
        };

        workerActivo.onerror = function (err) {
            clearTimeout(timeoutGlobal);
            setBtnSincronizando(false);
            workerActivo = null;
            console.error("[Worker] Error:", err);
            mostrarAlerta("Error inesperado en el worker. Intenta nuevamente.", "danger");
        };
    }

    window.addEventListener("online", () => {
        const lista = JSON.parse(localStorage.getItem("formularios")) || [];
        if (lista.length > 0 && USERNAME) {
            mostrarAlerta("Conexión restaurada. Sincronizando automáticamente...", "info");
            setTimeout(() => sincronizarTodos(), 1000);
        }
    });

    window.addEventListener("offline", () => {
        mostrarAlerta("Sin conexión. Los formularios se guardarán localmente.", "warning");
    });

</script>

</body>
</html>
