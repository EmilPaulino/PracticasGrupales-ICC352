<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Mis Formularios</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/layout.css}">

</head>

<body>

<div th:replace="~{templates/fragments/navbar.html :: navbar}"></div>

<main class="container mt-10">

    <div class="card shadow-sm border-0">

        <div class="card-header bg-white border-0 py-3">

            <div class="d-flex justify-content-between align-items-center">

                <h4 class="mb-0 fw-semibold">
                    Mis Formularios
                </h4>

                <div>
                    <button class="btn btn-success btn-sm me-2" onclick="sincronizarTodos()">
                        <i class="bi bi-cloud-upload"></i>
                        Sincronizar
                    </button>

                    <a class="btn btn-primary btn-sm" th:href="@{/formularios/crear}">
                        <i class="bi bi-plus-lg"></i>
                        Nuevo
                    </a>

                </div>

            </div>

        </div>

        <div class="card-body">

            <ul class="nav nav-tabs">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#pendientes">
                        Pendientes
                    </button>
                </li>

                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#sincronizados">
                        Sincronizados
                    </button>
                </li>
            </ul>

            <div class="tab-content mt-3">

                <div class="tab-pane fade show active" id="pendientes">

                    <div class="table-responsive">

                        <table class="table table-hover align-middle">

                            <thead class="table-light">

                                <tr>
                                    <th class="ps-4">Nombre</th>
                                    <th>Sector</th>
                                    <th>Nivel Escolar</th>
                                    <th class="text-center">Acciones</th>
                                </tr>

                            </thead>

                            <tbody id="tablaLocales">

                            </tbody>

                        </table>

                    </div>

                </div>


                <div class="tab-pane fade" id="sincronizados">

                    <div class="table-responsive">

                        <table class="table table-hover align-middle">

                            <thead class="table-light">

                                <tr>
                                    <th class="ps-4">Nombre</th>
                                    <th>Sector</th>
                                    <th>Nivel Escolar</th>
                                    <th>Fecha Registro</th>
                                    <th class="text-center">Acciones</th>
                                </tr>

                            </thead>

                            <tbody>

                            <tr th:each="f : ${formulariosSync}">
                                <td class="ps-4 fw-medium" th:text="${f.nombre}"></td>
                                <td th:text="${f.sector}"></td>
                                <td th:text="${f.nivelEscolar}"></td>
                                <td th:text="${#dates.format(f.fechaRegistro,'dd/MM/yyyy')}"></td>
                                <td class="text-center">
                                    <a class="btn btn-outline-primary btn-sm" th:href="@{/formularios/ver/{id}(id=${f.id})}">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </td>
                            </tr>

                            <tr th:if="${#lists.isEmpty(formulariosSync)}">
                                <td colspan="5" class="text-center text-muted py-4">
                                    No hay formularios sincronizados
                                </td>
                            </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

</main>

<div class="modal fade" id="modalEliminar" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header border-0">

                <h5 class="modal-title fw-semibold">
                    Eliminar formulario
                </h5>

                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body">

                ¿Estás seguro que deseas eliminar este formulario?

            </div>

            <div class="modal-footer border-0">

                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    Cancelar
                </button>

                <button type="button" class="btn btn-danger" id="btnConfirmarEliminar">
                    <i class="bi bi-trash me-1"></i>
                    Eliminar
                </button>

            </div>

        </div>

    </div>

</div>

<div class="modal fade" id="modalMensaje" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header border-0">

                <h5 class="modal-title fw-semibold" id="modalTitulo">
                    Mensaje
                </h5>

                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body" id="modalTexto">
                Mensaje
            </div>

            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    Cerrar
                </button>
            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

    let eliminarIndex=null;

    function mostrarModal(titulo,texto,tipo="primary"){

        let modalEl=
            document.getElementById("modalMensaje");

        let modal=
            new bootstrap.Modal(modalEl);

        modalTitulo.textContent=titulo;

        modalTexto.textContent=texto;

        modal.show();
    }

    function cargarLocales(){

        let lista=
            JSON.parse(localStorage.getItem("formularios"))||[];

        let tabla=
            document.getElementById("tablaLocales");

        tabla.innerHTML="";

        if(lista.length===0){

            tabla.innerHTML=`
                <tr>
                <td colspan="4"
                class="text-center text-muted py-4">
                No hay formularios pendientes
                </td>
                </tr>
                `;

            return;
        }

        lista.forEach((f,index)=>{

            let fila=document.createElement("tr");

            fila.innerHTML=`

                <td class="ps-4 fw-medium">
                ${f.nombre}
                </td>

                <td>
                ${f.sector}
                </td>

                <td>
                <span class="badge rounded-pill bg-warning text-dark">
                ${f.nivelEscolar}
                </span>
                </td>

                <td class="text-center">

                <div class="btn-group btn-group-sm">

                <button class="btn btn-outline-secondary"
                onclick="editar(${index})">

                <i class="bi bi-pencil"></i>

                </button>

                <button class="btn btn-outline-danger"
                onclick="abrirModalEliminar(${index})">

                <i class="bi bi-trash"></i>

                </button>

                </div>

                </td>
                `;

            tabla.appendChild(fila);

        });

    }

    cargarLocales();

    function abrirModalEliminar(index){
        eliminarIndex=index;

        let modal=
            new bootstrap.Modal(
                document.getElementById("modalEliminar")
            );

        modal.show();
    }

    document
        .getElementById("btnConfirmarEliminar")
        .addEventListener("click",()=>{

            let lista=
                JSON.parse(localStorage.getItem("formularios"))||[];

            lista.splice(eliminarIndex,1);

            localStorage.setItem(
                "formularios",
                JSON.stringify(lista)
            );

            location.reload();

        });

    function editar(index){

        localStorage.setItem(
            "editarIndex",
            index
        );

        window.location.href=
            "/formularios/editar";

    }

    function sincronizarTodos(){

        let lista=
            JSON.parse(localStorage.getItem("formularios"))||[];

        if(lista.length===0){

            mostrarModal(
                "Aviso",
                "No hay formularios para sincronizar",
                "warning"
            );

            return;
        }

        fetch("/api/formularios",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify(lista)

        })

            .then(response=>{

                if(response.ok){

                    localStorage.removeItem("formularios");

                    mostrarModal(
                        "Éxito",
                        "Formularios sincronizados correctamente",
                        "success"
                    );

                    setTimeout(()=>{

                        location.reload();

                    },1000);

                }

                else{

                    mostrarModal(
                        "Error",
                        "Ocurrió un error al sincronizar",
                        "danger"
                    );

                }

            })

            .catch(()=>{

                mostrarModal(
                    "Error",
                    "No se pudo conectar con el servidor",
                    "danger"
                );

            });

    }

</script>

</body>

</html>
