<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Layout Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>

<body>

<th:block th:with="activePage='dashboard'"></th:block>

<!-- NAVBAR -->

<div th:replace="~{templates/fragments/navbar.html :: navbar}"></div>

<!-- SIDEBAR -->

<div th:replace="~{templates/fragments/sidebar.html :: sidebar}"></div>

<div id="sidebarOverlay"></div>


<main class="main-content">

    <div class="container-fluid">

        <h3 class="fw-bold">
            Panel Administrativo
        </h3>

        <p class="text-muted">
            Prueba del layout responsive.
        </p>

        <div class="row g-3">

            <div class="col-md-3">

                <div class="card shadow-sm border-0">

                    <div class="card-body">

                        <h5>Formularios</h5>

                        <p class="display-6 fw-bold text-primary">
                            24
                        </p>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card shadow-sm border-0">

                    <div class="card-body">

                        <h5>Pendientes</h5>

                        <p class="display-6 fw-bold text-warning">
                            5
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/layout.js}"></script>

</body>

</html>
