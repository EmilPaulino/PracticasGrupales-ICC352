<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formularios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="min-vh-100 py-5">
  <div class="container" style="max-width: 860px;">

    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="fw-semibold mb-0">Formularios</h4>
            <p class="text-muted mb-0" style="font-size:13px;">Lista de formularios registrados</p>
        </div>
        <div class="d-flex gap-2">
            <button onclick="irCrearFormulario()" class="btn btn-dark rounded-3 fw-medium">
                <i class="bi bi-plus-lg me-2"></i>Nuevo formulario
            </button>
            <button onclick="logout()" class="btn btn-outline-secondary rounded-3 fw-medium">
                <i class="bi bi-box-arrow-right me-2"></i>Salir
            </button>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4">

      <div id="estadoCargando" class="text-center py-5">
        <div class="spinner-border text-secondary" style="width:1.5rem;height:1.5rem;"></div>
        <p class="text-muted mt-2 mb-0" style="font-size:14px;">Cargando formularios...</p>
      </div>

      <div id="estadoVacio" class="text-center py-5 d-none">
        <i class="bi bi-inbox text-secondary" style="font-size:2.5rem;"></i>
        <p class="text-muted mt-2 mb-0" style="font-size:14px;">No se encontraron formularios</p>
      </div>

      <div id="estadoError" class="d-none px-4 py-4">
        <div class="alert alert-danger rounded-3 mb-0" style="font-size:14px;">
          <i class="bi bi-exclamation-circle me-2"></i>
          <span id="textoError"></span>
        </div>
      </div>

      <div id="contenedorTabla" class="d-none">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0" style="font-size:14px;">
            <thead style="background:#f8f9fa;">
              <tr>
                <th class="px-3 py-3 fw-medium text-muted border-0" style="font-size:12px;text-transform:uppercase;letter-spacing:.05em;">Nombre</th>
                <th class="px-3 py-3 fw-medium text-muted border-0" style="font-size:12px;text-transform:uppercase;letter-spacing:.05em;">Sector</th>
                <th class="px-3 py-3 fw-medium text-muted border-0" style="font-size:12px;text-transform:uppercase;letter-spacing:.05em;">Nivel escolar</th>
                <th class="px-3 py-3 fw-medium text-muted border-0" style="font-size:12px;text-transform:uppercase;letter-spacing:.05em;">Foto</th>
              </tr>
            </thead>
            <tbody id="tablaFormularios"></tbody>
          </table>
        </div>

        <div class="d-flex align-items-center justify-content-between px-4 py-3 border-top border-light-subtle">
          <span id="infoPagina" class="text-muted" style="font-size:13px;"></span>
          <nav>
            <ul class="pagination pagination-sm mb-0 gap-1" id="controlesPaginacion"></ul>
          </nav>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal foto -->
<div class="modal fade" id="modalFoto" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 rounded-4 shadow">
      <div class="modal-header border-0 pb-0">
        <h6 class="modal-title fw-semibold" id="modalFotoNombre"></h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center pt-2">
        <img id="modalFotoImg" src="" alt="foto"
          style="max-width:100%;max-height:400px;border-radius:10px;object-fit:contain;">
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="config.js"></script>
<script>

const POR_PAGINA = 8;
let todos = [];
let paginaActual = 1;
let totalFormularios = 0;

const niveles = {
  BASICO: "Básico",
  MEDIO: "Medio",
  GRADO_UNIVERSITARIO: "Grado universitario",
  POSTGRADO: "Postgrado",
  DOCTORADO: "Doctorado"
};

function cargarFormularios() {
  const token = localStorage.getItem("token");
  if (!token) {
    alert("Debe iniciar sesión primero");
    window.location.href = "login.html";
    return;
  }

  mostrarEstado("cargando");

  fetch(API_URL + "/api/formularios?page=" + paginaActual + "&size=" + POR_PAGINA, {
    method: "GET",
    headers: { "Authorization": "Bearer " + token }
  })
  .then(function(response) {
    if (!response.ok) throw new Error();
    return response.json();
  })
  .then(function(result) {
    todos = result.data;
    totalFormularios = result.total;
    renderizar();
  })
  .catch(function() {
    mostrarEstado("error", "No se pudo cargar los formularios");
  });
}

function renderizar() {
  if (totalFormularios === 0) { mostrarEstado("vacio"); return; }
  mostrarEstado("tabla");

  const total = totalFormularios;
  const totalPaginas = Math.ceil(total / POR_PAGINA);
  const inicio = (paginaActual - 1) * POR_PAGINA;
  let fin = inicio + todos.length;
  if (fin > total) fin = total;

  if (todos.length === 0 && total > 0) { paginaActual = 1; cargarFormularios(); return; }

  const tbody = document.getElementById("tablaFormularios");
  document.getElementById("infoPagina").textContent = "Mostrando " + (inicio + 1) + "–" + fin + " de " + total;

  tbody.innerHTML = todos.map(function(f) {
    const labelNivel = niveles[f.nivelEscolar] || f.nivelEscolar;
    const tieneFoto = f.fotoBase64 && f.fotoBase64.length > 0;
    const fotoSrc = tieneFoto ? (f.fotoBase64.startsWith("data:") ? f.fotoBase64 : "data:image/jpeg;base64," + f.fotoBase64) : "";
    return "<tr>" +
      "<td class='px-3 fw-medium'>" + f.nombre + "</td>" +
      "<td class='px-3 text-muted'>" + f.sector + "</td>" +
      "<td class='px-3 text-muted'>" + labelNivel + "</td>" +
      "<td class='px-3'>" +
        (tieneFoto ? "<img src='" + fotoSrc + "' alt='foto' style='width:36px;height:36px;object-fit:cover;border-radius:8px;cursor:pointer;border:1px solid #dee2e6;' onclick=\"verFoto('" + fotoSrc + "', '" + f.nombre + "')\">" : "<span class='text-muted' style='font-size:12px;'>—</span>") +
      "</td>" +
    "</tr>";
  }).join("");

  const ul = document.getElementById("controlesPaginacion");
  ul.innerHTML = "";
  ul.innerHTML += "<li class='page-item " + (paginaActual === 1 ? "disabled" : "") + "'><button class='page-link rounded-3 border-0' onclick='irPagina(" + (paginaActual - 1) + ")'><i class='bi bi-chevron-left' style='font-size:11px;'></i></button></li>";
  for (let p = 1; p <= totalPaginas; p++) {
    if (totalPaginas > 7 && p > 2 && p < totalPaginas - 1 && Math.abs(p - paginaActual) > 1) {
      if (p === 3 || p === totalPaginas - 2) ul.innerHTML += "<li class='page-item disabled'><span class='page-link border-0 bg-transparent'>…</span></li>";
      continue;
    }
    ul.innerHTML += "<li class='page-item'><button class='page-link rounded-3 border-0 " + (p === paginaActual ? "bg-dark text-white" : "") + "' onclick='irPagina(" + p + ")' style='min-width:34px;'>" + p + "</button></li>";
  }
  ul.innerHTML += "<li class='page-item " + (paginaActual === totalPaginas ? "disabled" : "") + "'><button class='page-link rounded-3 border-0' onclick='irPagina(" + (paginaActual + 1) + ")'><i class='bi bi-chevron-right' style='font-size:11px;'></i></button></li>";
}

function irPagina(p) {
  const totalPaginas = Math.ceil(totalFormularios / POR_PAGINA);
  if (p < 1 || p > totalPaginas) return;
  paginaActual = p;
  cargarFormularios();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function verFoto(src, nombre) {
  document.getElementById("modalFotoImg").src = src;
  document.getElementById("modalFotoNombre").textContent = nombre;
  new bootstrap.Modal(document.getElementById("modalFoto")).show();
}

function mostrarEstado(estado, errorMsg) {
  document.getElementById("estadoCargando").classList.add("d-none");
  document.getElementById("estadoVacio").classList.add("d-none");
  document.getElementById("estadoError").classList.add("d-none");
  document.getElementById("contenedorTabla").classList.add("d-none");
  if (estado === "cargando") document.getElementById("estadoCargando").classList.remove("d-none");
  else if (estado === "vacio") document.getElementById("estadoVacio").classList.remove("d-none");
  else if (estado === "error") { document.getElementById("textoError").textContent = errorMsg; document.getElementById("estadoError").classList.remove("d-none"); }
  else if (estado === "tabla") document.getElementById("contenedorTabla").classList.remove("d-none");
}

function irCrearFormulario() { window.location.href = "crear-formulario.html"; }
function logout() { localStorage.removeItem("token"); window.location.href = "login.html"; }

cargarFormularios();
</script>

</body>
</html>
