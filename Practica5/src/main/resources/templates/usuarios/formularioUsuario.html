<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Usuario</title>
    <link rel="canonical" href="https://getbootstrap.com/docs/5.3/examples/blog/"/>
    <script src="../assets/js/color-modes.js"></script>
    <link href="https://fonts.googleapis.com/css?family=Playfair+Display:700,900&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/estilos/estilosUsuarios.css"/>
    <link rel="stylesheet" href="/estilos/estilosNavbar.css"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div th:replace="~{/templates/fragmentos/navbar.html :: navbar}"></div>

<h2 class="mt-4 mb-4 text-center"
    th:text="${usuario != null} ? 'Editar Usuario' : 'Crear Usuario'">
</h2>

<div class="formUsuario">
    <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="${usuario != null} ? @{'/usuarios/editar/' + ${usuario.id}} : @{/usuarios/crear}" method="post" enctype="multipart/form-data">

        <input type="hidden"
               name="id"
               th:if="${usuario != null}"
               th:value="${usuario.id}">

        <div class="mb-3">
            <label class="form-label">Foto del Usuario</label>
            <div onclick="document.getElementById('fotoInput').click()"
                 style="border: 1px dashed #ccc; border-radius: 8px; padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px;">

                <img id="previewImg"
                     th:src="${usuario != null and !#strings.isEmpty(usuario.fotoBase64)} ? 'data:image/jpeg;base64,' + ${usuario.fotoBase64} : ''"
                     th:style="${usuario != null and !#strings.isEmpty(usuario.fotoBase64)} ? 'display:block; width:50px; height:50px; border-radius:50%; object-fit:cover;' : 'display:none'">

                <p id="dropText" class="text-muted mb-0" style="font-size: 14px;">
                    <span th:text="${usuario != null and !#strings.isEmpty(usuario.fotoBase64)} ? 'Foto actual' : '📁 Seleccionar foto'"></span>
                </p>
            </div>
            <input type="file" id="fotoInput" name="foto" accept="image/*" style="display:none;">
        </div>

        <script>
            document.getElementById('fotoInput').addEventListener('change', function() {
                const file = this.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.getElementById('previewImg');
                    img.src = e.target.result;
                    img.style.cssText = 'display:block; width:50px; height:50px; border-radius:50%; object-fit:cover;';
                    document.getElementById('dropText').textContent = file.name;
                };
                reader.readAsDataURL(file);
            });
        </script>

        <div class="mb-3">
            <label class="form-label">Nombre de Usuario</label>
            <input type="text"
                   class="form-control"
                   name="username"
                   required
                   th:value="${usuario != null} ? ${usuario.username} : ''">
        </div>

        <div class="mb-3">
            <label class="form-label">Nombre Completo</label>
            <input type="text"
                   class="form-control"
                   name="nombre"
                   required
                   th:value="${usuario != null} ? ${usuario.nombre} : ''">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password"
                   class="form-control"
                   name="password"
                   th:required="${usuario == null}">
        </div>

        <div class="form-check form-check-inline">
            <input class="form-check-input"
                   type="checkbox"
                   name="administrator"
                   th:checked="${usuario != null} ? ${usuario.administrator} : false">
            <label class="form-check-label">Administrador</label>
        </div>

        <div class="form-check form-check-inline">
            <input class="form-check-input"
                   type="checkbox"
                   name="autor"
                   th:checked="${usuario != null} ? ${usuario.autor} : false">
            <label class="form-check-label">Autor</label>
        </div>

        <div class="buttonFooter mt-4">
            <a class="btn btn-secondary me-3" href="/usuarios">Cancelar</a>

            <button type="submit"
                    class="btn btn-primary"
                    th:text="${usuario != null} ? 'Actualizar Usuario' : 'Crear Usuario'">
            </button>
        </div>

    </form>
</div>
</body>
</html>
