<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${evento.titulo}">Detalle del Evento</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/visualizarEvento.css}">
</head>
<body>

<div th:replace="~{templates/fragments/layout.html :: navbar-top-public}"></div>
<div th:replace="~{templates/fragments/layout.html :: offcanvas-public}"></div>

<!-- Header -->
<div class="page-header">
    <div class="container">
        <a href="/" class="volver">
            <i class="bi bi-arrow-left"></i> Volver a eventos
        </a>
        <h1 th:text="${evento.titulo}">Título del Evento</h1>
        <div class="sub">
            <span class="fecha-badge">
                <i class="bi bi-calendar3"></i>
                <span th:text="${#temporals.format(evento.fecha, 'dd MMM yyyy')}"></span>
            </span>
            <span class="text-muted mx-1">·</span>
            <i class="bi bi-geo-alt text-primary"></i>
            <span th:text="${evento.lugar}"></span>
        </div>
    </div>
</div>

<!-- Contenido -->
<div class="section">
    <div class="container">
        <div class="row g-4">

            <!-- Izquierda -->
            <div class="col-lg-8">

                <div class="detail-card">
                    <div class="card-body">
                        <div class="card-title">Sobre este evento</div>
                        <p class="text-muted mb-0"
                           style="white-space: pre-line; line-height: 1.8; font-size: 0.93rem;"
                           th:text="${evento.descripcion}">Descripción...</p>
                    </div>
                </div>

                <div class="detail-card">
                    <div class="card-body">
                        <div class="card-title">Detalles</div>
                        <div class="info-row">
                            <div class="info-icon"><i class="bi bi-calendar-check"></i></div>
                            <div>
                                <div class="info-label">Fecha</div>
                                <div class="info-value" th:text="${#temporals.format(evento.fecha, 'dd \'de\' MMMM, yyyy')}"></div>
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-icon"><i class="bi bi-clock"></i></div>
                            <div>
                                <div class="info-label">Hora</div>
                                <div class="info-value" th:text="${#temporals.format(evento.hora, 'hh:mm a')}"></div>
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-icon"><i class="bi bi-geo-alt"></i></div>
                            <div>
                                <div class="info-label">Lugar</div>
                                <div class="info-value" th:text="${evento.lugar}"></div>
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-icon"><i class="bi bi-person-badge"></i></div>
                            <div>
                                <div class="info-label">Organizador</div>
                                <div class="info-value" th:text="${evento.organizador.nombre}"></div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Derecha -->
            <div class="col-lg-4">
                <div class="register-card">
                    <div class="card-body">

                        <div style="font-size:0.95rem; font-weight:700; color:#0f172a; margin-bottom:4px;">Inscripción</div>
                        <p class="text-muted mb-3" style="font-size:0.82rem;">Reserva tu lugar en este evento</p>

                        <!-- Stats -->
                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <div class="cupo-stat">
                                    <div class="number" th:text="${inscritos}">0</div>
                                    <div class="label">Inscritos</div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="cupo-stat">
                                    <div class="number"
                                         th:classappend="${evento.cupoMaximo - inscritos <= 0} ? 'bad' : 'ok'"
                                         th:text="${evento.cupoMaximo - inscritos}">0</div>
                                    <div class="label">Disponibles</div>
                                </div>
                            </div>
                        </div>

                        <!-- Barra -->
                        <div class="mb-3">
                            <div class="d-flex justify-content-between mb-1" style="font-size:0.78rem; color:#94a3b8;">
                                <span>Ocupación</span>
                                <span th:text="${inscritos} + ' / ' + ${evento.cupoMaximo}"></span>
                            </div>
                            <div class="progress" style="height:6px; border-radius:999px; background:#f1f5f9;">
                                <div class="progress-bar"
                                     role="progressbar"
                                     th:style="'width: ' + ${inscritos > 0 ? (inscritos * 100) / evento.cupoMaximo : 0} + '%'"
                                     th:classappend="${inscritos >= evento.cupoMaximo} ? 'bg-danger' : 'bg-success'"
                                     style="border-radius:999px;">
                                </div>
                            </div>
                        </div>

                        <hr style="border-color:#f1f5f9; margin: 1rem 0;">

                        <!-- Cancelado -->
                        <div th:if="${evento.cancelado}"
                             class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-0"
                             style="font-size:0.85rem; border-radius:8px;">
                            <i class="bi bi-x-octagon-fill"></i>
                            <span>Este evento ha sido cancelado.</span>
                        </div>

                        <!-- Sin sesión -->
                        <a th:if="${session.usuario == null and !evento.cancelado}"
                           th:href="@{/login}" class="btn-inscribirse d-block text-center text-decoration-none">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Inicia sesión para inscribirte
                        </a>

                        <!-- Ya inscrito -->
                        <button th:if="${session.usuario != null and yaInscrito and !evento.cancelado}"
                                class="btn btn-success w-100 disabled"
                                style="border-radius:8px; font-weight:600; font-size:0.875rem;">
                            <i class="bi bi-check-circle-fill me-2"></i>Ya estás inscrito
                        </button>

                        <!-- Inscribirse -->
                        <form th:if="${session.usuario != null and !yaInscrito and !evento.cancelado and inscritos < evento.cupoMaximo}"
                              th:action="@{/eventos/inscribirse/{id}(id=${evento.id})}" method="post">
                            <button type="submit" class="btn-inscribirse">
                                <i class="bi bi-lightning-charge me-2"></i>Inscribirme ahora
                            </button>
                        </form>

                        <!-- Cupos agotados -->
                        <button th:if="${!evento.cancelado and inscritos >= evento.cupoMaximo and !yaInscrito}"
                                class="btn-lleno" disabled>
                            <i class="bi bi-slash-circle me-2"></i>Cupos agotados
                        </button>

                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
