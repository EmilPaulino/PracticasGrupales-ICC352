<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${evento != null} ? 'Editar Evento' : 'Nuevo Evento'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>
<body class="bg-light">

<div th:replace="~{templates/fragments/layout.html :: navbar-top}"></div>

<div class="d-flex">

    <div th:replace="~{templates/fragments/layout.html :: sidebar}"></div>

    <main class="flex-fill p-4" style="margin-left: 260px; margin-top: 56px;">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3" th:text="${evento != null} ? 'Editar Evento' : 'Nuevo Evento'"></h1>
        </div>

        <div class="card">
            <div class="card-body">

                <form method="post"
                      th:action="${evento != null} ? '/eventos/editar/' + ${evento.id} : '/eventos/crear'">

                    <div class="mb-3">
                        <label class="form-label">Título</label>
                        <input type="text" name="titulo" class="form-control"
                               th:value="${evento != null} ? ${evento.titulo} : ''" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea name="descripcion" class="form-control" rows="4" required
                                  th:text="${evento != null} ? ${evento.descripcion} : ''"></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Fecha</label>
                            <input type="date" name="fecha" class="form-control"
                                   th:value="${evento != null} ? ${evento.fecha} : ''" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Hora</label>
                            <input type="time" name="hora" class="form-control"
                                   th:value="${evento != null} ? ${evento.hora} : ''" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Lugar</label>
                        <input type="text" name="lugar" class="form-control"
                               th:value="${evento != null} ? ${evento.lugar} : ''" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Cupo Máximo</label>
                        <input type="number" name="cupoMaximo" class="form-control" min="1"
                               th:value="${evento != null} ? ${evento.cupoMaximo} : ''" required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-lg"></i>
                            <span th:text="${evento != null} ? 'Actualizar' : 'Guardar'"></span>
                        </button>
                        <a href="/eventos" class="btn btn-secondary">Cancelar</a>
                    </div>

                </form>

            </div>
        </div>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
