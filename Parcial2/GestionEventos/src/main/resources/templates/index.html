<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PUCMM Eventos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/index.css}">
</head>
<body>

<div th:replace="~{templates/fragments/layout.html :: navbar-top-public}"></div>
<div th:replace="~{templates/fragments/layout.html :: offcanvas-public}"></div>

<!-- Header -->
<div class="page-header">
    <div class="container">
        <h1><i class="bi bi-calendar-event me-2 text-primary"></i>Eventos Académicos</h1>
        <p>Descubre charlas, talleres y seminarios de la universidad</p>
    </div>
</div>

<!-- Eventos -->
<div class="eventos-section">
    <div class="container">

        <div class="section-meta">
            <h2>Eventos disponibles</h2>
            <span class="count-pill" th:text="${#lists.size(eventos)} + ' eventos'">0 eventos</span>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(eventos)}" class="empty-state">
            <i class="bi bi-calendar-x"></i>
            <p class="mb-1">No hay eventos disponibles por el momento.</p>
            <small>Vuelve pronto para ver nuevos eventos.</small>
        </div>

        <!-- Grid -->
        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-3">
            <div class="col" th:each="evento : ${eventos}">
                <div class="evento-card card h-100">
                    <div class="card-body">

                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <span class="fecha-badge">
                                <i class="bi bi-calendar3"></i>
                                <span th:text="${#temporals.format(evento.fecha, 'dd MMM yyyy')}"></span>
                            </span>
                            <span th:if="${evento.cupoMaximo - inscritos[evento.id] <= 0}"
                                  class="cupo-badge bg-danger-subtle text-danger">Lleno</span>
                            <span th:if="${evento.cupoMaximo - inscritos[evento.id] > 0 and evento.cupoMaximo - inscritos[evento.id] <= 5}"
                                  class="cupo-badge bg-warning-subtle text-warning"
                                  th:text="${evento.cupoMaximo - inscritos[evento.id]} + ' cupos'"></span>
                            <span th:if="${evento.cupoMaximo - inscritos[evento.id] > 5}"
                                  class="cupo-badge bg-success-subtle text-success"
                                  th:text="${evento.cupoMaximo - inscritos[evento.id]} + ' cupos'"></span>
                        </div>

                        <h5 class="titulo-evento" th:text="${evento.titulo}"></h5>
                        <p class="descripcion-evento" th:text="${evento.descripcion}"></p>

                        <div class="info-item">
                            <i class="bi bi-clock"></i>
                            <span th:text="${#temporals.format(evento.hora, 'hh:mm a')}"></span>
                        </div>
                        <div class="info-item">
                            <i class="bi bi-geo-alt"></i>
                            <span th:text="${evento.lugar}"></span>
                        </div>
                        <div class="info-item">
                            <i class="bi bi-people"></i>
                            <span th:text="${evento.cupoMaximo - inscritos[evento.id]} + ' de ' + ${evento.cupoMaximo} + ' cupos disponibles'"></span>
                        </div>

                    </div>
                    <div class="card-footer">
                        <a th:if="${evento.cupoMaximo - inscritos[evento.id] > 0}"
                           th:href="@{/eventos/ver/{id}(id=${evento.id})}"
                           class="btn btn-inscribirse w-100">
                            Ver detalle
                        </a>
                        <button th:unless="${evento.cupoMaximo - inscritos[evento.id] > 0}"
                                class="btn btn-lleno w-100" disabled>
                            Sin cupos disponibles
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
