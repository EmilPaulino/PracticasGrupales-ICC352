<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/panel.css">
    <link rel="stylesheet" href="/css/layout.css">
</head>
<body>

<div th:replace="~{templates/fragments/layout.html :: navbar-top}"></div>

<div class="d-flex">

    <div th:replace="~{templates/fragments/layout.html :: sidebar}"></div>

    <main class="flex-fill p-4" style="margin-left: 260px; margin-top: 56px;">

        <div class="card shadow-sm text-center py-5">
            <div class="card-body">

                <i class="bi bi-calendar-event display-4 text-primary mb-3"></i>

                <h2 class="fw-semibold">Eventos PUCMM</h2>

                <p class="text-muted mb-0">
                    Sistema de gestión de eventos universitarios
                </p>

            </div>
        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
