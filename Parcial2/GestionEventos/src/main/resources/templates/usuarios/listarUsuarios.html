<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuarios</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>
<body>

<div th:replace="~{templates/fragments/layout.html :: navbar-top}"></div>

<div class="d-flex">

    <div th:replace="~{templates/fragments/layout.html :: sidebar}"></div>

    <main class="flex-fill p-4" style="margin-left: 260px; margin-top: 55px;">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3">Gestión de Usuarios</h1>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="d-flex justify-content-end mb-3">
                    <a th:href="@{/panel/usuarios/nuevo}" class="btn btn-outline-success">
                        <i class="bi bi-person-plus me-1"></i> Nuevo Usuario
                    </a>
                </div>
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th></th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="usuario : ${usuarios}">
                        <td>
                            <img th:if="${usuario.fotoBase64 != null}"
                                 th:src="${usuario.fotoBase64}"
                                 width="36" height="36"
                                 class="rounded-circle object-fit-cover">
                            <img th:unless="${usuario.fotoBase64 != null}"
                                 src="/img/sinFoto.png"
                                 width="36" height="36"
                                 class="rounded-circle">
                        </td>
                        <td th:text="${usuario.nombre}"></td>
                        <td th:text="${usuario.email}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${usuario.rol.rol == 'Admin'} ? 'text-bg-danger' : (${usuario.rol.rol == 'Organizador'} ? 'text-bg-primary' : 'text-bg-secondary')"
                                  th:text="${usuario.rol.rol}">
                            </span>
                        </td>
                        <td>
                            <span th:if="${usuario.activo}" class="badge text-bg-success">Activo</span>
                            <span th:unless="${usuario.activo}" class="badge text-bg-danger">Bloqueado</span>
                        </td>
                        <td>
                            <div class="d-flex gap-2">
                                <a th:href="@{/panel/usuarios/{id}/editar(id=${usuario.id})}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-pencil-square"></i>
                                </a>
                                <button type="button"
                                        class="btn btn-sm btn-outline-danger"
                                        data-bs-toggle="modal"
                                        data-bs-target="#modalEliminar"
                                        th:data-id="${usuario.id}">
                                    <i class="bi bi-trash3"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="6" class="text-center text-muted py-4">No hay usuarios registrados.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>
</div>

<!-- Modal Eliminar -->
<div class="modal fade" id="modalEliminar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirmar eliminación</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                ¿Estás seguro que deseas eliminar este usuario?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <form id="formEliminar" method="post">
                    <button type="submit" class="btn btn-danger">Eliminar</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script>
    const modalEliminar = document.getElementById('modalEliminar');
    modalEliminar.addEventListener('show.bs.modal', event => {
        const btn = event.relatedTarget;
        const id = btn.getAttribute('data-id');
        document.getElementById('formEliminar').action = `/panel/usuarios/${id}/eliminar`;
    });
</script>
</body>
</html>
