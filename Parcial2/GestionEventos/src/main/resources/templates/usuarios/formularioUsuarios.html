<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${usuario != null} ? 'Editar Usuario' : 'Nuevo Usuario'"></title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>
<body>

<div th:replace="~{templates/fragments/layout.html :: navbar-top}"></div>

<div class="d-flex">

    <div th:replace="~{templates/fragments/layout.html :: sidebar}"></div>

    <main class="flex-fill p-4" style="margin-left: 260px; margin-top: 55px;">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3" th:text="${usuario != null} ? 'Editar Usuario' : 'Nuevo Usuario'"></h1>
        </div>

        <div class="card">
            <div class="card-body">

                <form method="post" th:action="${usuario != null} ? '/usuarios/editar/' + ${usuario.id} : '/usuarios/crear'" enctype="multipart/form-data">

                    <div class="mb-3">
                        <label class="form-label">Foto de Perfil</label>
                        <br>
                        <input type="file" name="foto" accept="image/*">
                        <div class="mt-2" th:if="${usuario != null and usuario.fotoBase64 != null}">
                            <img th:src="${!#strings.isEmpty(usuario.fotoBase64)} ? 'data:image/png;base64,' + ${usuario.fotoBase64} : '/img/sinFoto.png'" style="width:100px; border-radius:8px;">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" th:value="${usuario != null} ? ${usuario.nombre} : ''" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" th:value="${usuario != null} ? ${usuario.email} : ''" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Ingrese nueva contraseña si desea cambiarla">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Rol</label>
                        <select class="form-select" name="rol" required>
                            <option value="" disabled th:selected="${usuario == null}">
                                Seleccione un rol
                            </option>
                            <option
                                    th:each="rol : ${roles}"
                                    th:value="${rol.id}"
                                    th:text="${rol.rol}"
                                    th:selected="${usuario != null and usuario.rol.id == rol.id}">
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox"  role="switch" name="activo" th:checked="${usuario == null or usuario.activo}">
                            <label class="form-check-label">Usuario Activo</label>
                        </div>
                    </div>

                    <div class="d-flex gap-2">

                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-lg"></i>
                            <span th:text="${usuario != null} ? 'Actualizar' : 'Guardar'"></span>
                        </button>

                        <a href="/usuarios" class="btn btn-secondary">
                            Cancelar
                        </a>

                    </div>

                </form>

            </div>
        </div>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>

</body>
</html>
