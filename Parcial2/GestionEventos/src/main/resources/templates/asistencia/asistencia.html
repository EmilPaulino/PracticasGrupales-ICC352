<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escanear QR</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/layout.css}">

    <style>

        .card-fixed{
            min-height:340px;
        }

        .scanner-box{
            width:100%;
            height:230px;
            background:#000;
            border-radius:10px;
            overflow:hidden;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        #reader{
            width:100%;
            height:100%;
        }

    </style>

</head>

<body class="bg-light">

<div th:replace="~{templates/fragments/layout.html :: navbar-top}"></div>

<div class="d-flex">

    <div th:replace="~{templates/fragments/layout.html :: sidebar}"></div>

    <main class="flex-fill p-4" style="margin-left:260px;margin-top:56px;">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3">Escanear QR de Asistencia</h1>
        </div>

        <div class="row g-4 justify-content-center">

            <!-- CARD CAMARA -->
            <div class="col-lg-5">

                <div class="card border-0 shadow-sm card-fixed h-100">

                    <div class="card-body p-3">

                        <h5 class="card-title mb-3">
                            <i class="bi bi-qr-code-scan me-2 text-primary"></i>
                            Cámara
                        </h5>

                        <div class="scanner-box">
                            <div id="reader"></div>
                        </div>

                        <div class="d-flex gap-2 mt-3">

                            <button id="btnIniciar"
                                    class="btn btn-primary w-100"
                                    onclick="iniciarEscaner()">

                                <i class="bi bi-camera me-2"></i>
                                Iniciar cámara

                            </button>

                            <button id="btnDetener"
                                    class="btn btn-outline-secondary w-100"
                                    onclick="detenerEscaner()"
                                    style="display:none;">

                                <i class="bi bi-stop-circle me-2"></i>
                                Detener

                            </button>

                        </div>

                    </div>
                </div>

            </div>

            <!-- CARD RESULTADO -->
            <div class="col-lg-5">

                <div class="card border-0 shadow-sm card-fixed h-100">

                    <div class="card-body p-3">

                        <h5 class="card-title mb-3">
                            <i class="bi bi-person-check me-2 text-primary"></i>
                            Resultado
                        </h5>

                        <!-- Estado inicial -->

                        <div id="estadoInicial"
                             class="text-center py-4 text-muted">

                            <i class="bi bi-qr-code"
                               style="font-size:2.5rem;opacity:0.3;display:block;margin-bottom:1rem;"></i>

                            <p class="mb-0">
                                Escanea un código QR para ver el resultado aquí.
                            </p>

                        </div>

                        <!-- Procesando -->

                        <div id="estadoProcesando"
                             style="display:none;"
                             class="text-center py-4">

                            <div class="spinner-border text-primary mb-3"></div>

                            <p class="text-muted mb-0">
                                Verificando...
                            </p>

                        </div>

                        <!-- Exito -->

                        <div id="estadoExito"
                             style="display:none;">

                            <div class="alert alert-success d-flex align-items-center gap-2 mb-3">

                                <i class="bi bi-check-circle-fill fs-5"></i>

                                <span class="fw-semibold">
Asistencia registrada
</span>

                            </div>

                            <div class="list-group list-group-flush">

                                <div class="list-group-item px-0">

                                    <small class="text-muted d-block">
                                        Participante
                                    </small>

                                    <strong id="resultNombre"></strong>

                                </div>

                                <div class="list-group-item px-0">

                                    <small class="text-muted d-block">
                                        Evento
                                    </small>

                                    <strong id="resultEvento"></strong>

                                </div>

                                <div class="list-group-item px-0">

                                    <small class="text-muted d-block">
                                        Hora de registro
                                    </small>

                                    <strong id="resultHora"></strong>

                                </div>

                            </div>

                        </div>

                        <!-- Error -->

                        <div id="estadoError"
                             style="display:none;">

                            <div class="alert alert-danger d-flex align-items-center gap-2">

                                <i class="bi bi-x-octagon-fill fs-5"></i>

                                <span id="mensajeError"></span>

                            </div>

                        </div>

                    </div>
                </div>

            </div>

        </div>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script th:src="@{/js/sidebar.js}"></script>

<script>

    let html5QrCode=null;
    let procesando=false;

    function mostrarEstado(estado){

        document.getElementById('estadoInicial').style.display='none';
        document.getElementById('estadoProcesando').style.display='none';
        document.getElementById('estadoExito').style.display='none';
        document.getElementById('estadoError').style.display='none';

        document.getElementById(estado).style.display='block';

    }

    function iniciarEscaner(){

        html5QrCode=new Html5Qrcode("reader");

        html5QrCode.start(
            {facingMode:"environment"},
            {fps:10,qrbox:{width:220,height:220}},
            onScanExito,
            onScanError

        ).then(()=>{

            document.getElementById('btnIniciar').style.display='none';
            document.getElementById('btnDetener').style.display='block';

        }).catch(err=>{

            mostrarEstado('estadoError');

            document.getElementById('mensajeError').textContent='No se pudo acceder a la cámara: '+err;

        });

    }

    function detenerEscaner(){

        if(html5QrCode){

            html5QrCode.stop().then(()=>{

                document.getElementById('btnIniciar').style.display='block';
                document.getElementById('btnDetener').style.display='none';

                mostrarEstado('estadoInicial');

            });

        }

    }

    function onScanExito(token){

        if(procesando)return;

        procesando=true;

        mostrarEstado('estadoProcesando');

        const formData=new FormData();
        formData.append('token',token);

        fetch('/asistencia/marcar',{
            method:'POST',
            body:formData
        })

            .then(res=>{
                if(!res.ok)return res.text().then(t=>{throw new Error(t)});
                return res.json();
            })

            .then(data=>{

                document.getElementById('resultNombre').textContent=data.nombre;
                document.getElementById('resultEvento').textContent=data.evento;
                document.getElementById('resultHora').textContent=data.hora;

                mostrarEstado('estadoExito');

                setTimeout(()=>{

                    procesando=false;
                    mostrarEstado('estadoInicial');

                },3000);

            })

            .catch(err=>{

                document.getElementById('mensajeError').textContent=err.message;

                mostrarEstado('estadoError');

                setTimeout(()=>{

                    procesando=false;
                    mostrarEstado('estadoInicial');

                },3000);

            });

    }

    function onScanError(error){
// ignorar frames sin QR
    }

</script>

</body>
</html>
