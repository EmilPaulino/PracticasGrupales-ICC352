<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--/* ===== NAVBAR TOP (desktop + móvil) ===== */-->
<nav th:fragment="navbar-top"
     class="navbar navbar-dark bg-dark px-3 px-lg-4"
     style="height: 56px;">

    <!-- Logo: visible siempre -->
    <a th:href="@{/panel}" class="d-flex align-items-center text-white text-decoration-none">
        <img th:src="@{/img/logo.png}" alt="PUCMM" width="40" height="40" class="me-2">
        <span class="fs-5 fw-semibold">Eventos</span>
    </a>

    <!-- Hamburguesa: solo móvil, a la derecha del logo -->
    <button class="navbar-toggler border-secondary ms-auto d-lg-none"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#sidebarOffcanvas"
            aria-controls="sidebarOffcanvas"
            aria-label="Abrir menú">
        <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Usuario: solo desktop -->
    <div class="dropdown ms-auto d-none d-lg-block">
        <a href="#"
           class="d-flex align-items-center text-white text-decoration-none dropdown-toggle"
           data-bs-toggle="dropdown">
            <img src="/img/sinFoto.png" alt="" width="32" height="32" class="rounded-circle me-2">
            <strong>
                <span th:if="${session.usuario != null}"
                      th:text="${session.usuario.nombre}">
                </span>
            </strong>
        </a>
        <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end text-small shadow">
            <li><a class="dropdown-item" th:href="@{/logout}">Sign out</a></li>
        </ul>
    </div>

</nav>

<!--/* ===== SIDEBAR ===== */-->
<div th:fragment="sidebar">

    <!--/* --- Desktop: sidebar fijo --- */-->
    <div class="d-none d-lg-flex flex-column flex-shrink-0 p-3 text-bg-dark"
         style="width: 260px; height: calc(100vh - 56px); position: fixed; top: 56px; left: 0; overflow-y: auto;">

        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a th:href="@{/}" class="nav-link text-white">
                    <i class="bi bi-house me-2"></i>Página Principal
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/panel}" class="nav-link text-white">
                    <i class="bi bi-speedometer2 me-2"></i>Panel de Administración
                </a>
            </li>
            <li>
                <a th:href="@{/usuarios}" class="nav-link text-white">
                    <i class="bi bi-person-circle me-2"></i>Gestión de Usuarios
                </a>
            </li>
            <li>
                <a th:href="@{/eventos}" class="nav-link text-white">
                    <i class="bi bi-calendar4-event me-2"></i>Gestión de Eventos
                </a>
            </li>
            <li>
                <a th:href="@{/asistencia}" class="nav-link text-white">
                    <i class="bi bi-calendar-check me-2"></i>Asistencia
                </a>
            </li>
        </ul>

        <hr>

        <div class="dropdown">
            <a href="#"
               class="d-flex align-items-center text-white text-decoration-none dropdown-toggle"
               data-bs-toggle="dropdown">
                <img src="/img/sinFoto.png" alt="" width="32" height="32" class="rounded-circle me-2">
                <strong>Admin</strong>
            </a>
            <ul class="dropdown-menu dropdown-menu-dark text-small shadow">
                <li><a class="dropdown-item" th:href="@{/logout}">Sign out</a></li>
            </ul>
        </div>
    </div>

    <!--/* --- Móvil: offcanvas --- */-->
    <div class="offcanvas offcanvas-start text-bg-dark d-lg-none"
         tabindex="-1"
         id="sidebarOffcanvas"
         aria-labelledby="sidebarOffcanvasLabel"
         style="width: 260px;">

        <div class="offcanvas-header">
            <span class="fs-5 fw-semibold" id="sidebarOffcanvasLabel">Menú</span>
            <button type="button"
                    class="btn-close btn-close-white"
                    data-bs-dismiss="offcanvas"
                    aria-label="Cerrar"></button>
        </div>

        <div class="offcanvas-body d-flex flex-column p-3 pt-0">
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item">
                    <a th:href="@{/}" class="nav-link text-white">
                        <i class="bi bi-house me-2"></i>Página Principal
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/panel}" class="nav-link text-white">
                        <i class="bi bi-speedometer2 me-2"></i>Panel de Administración
                    </a>
                </li>
                <li>
                    <a th:href="@{/usuarios}" class="nav-link text-white">
                        <i class="bi bi-person-circle me-2"></i>Gestión de Usuarios
                    </a>
                </li>
                <li>
                    <a th:href="@{/eventos}" class="nav-link text-white">
                        <i class="bi bi-calendar4-event me-2"></i>Gestión de Eventos
                    </a>
                </li>
                <li>
                    <a th:href="@{/asistencia}" class="nav-link text-white">
                        <i class="bi bi-calendar-check me-2"></i>Asistencia
                    </a>
                </li>
            </ul>
            <hr>

            <div class="dropdown">
                <a href="#"
                   class="d-flex align-items-center text-white text-decoration-none dropdown-toggle"
                   data-bs-toggle="dropdown">
                    <img src="/img/sinFoto.png" alt="" width="32" height="32" class="rounded-circle me-2">
                    <strong>Admin</strong>
                </a>
                <ul class="dropdown-menu dropdown-menu-dark text-small shadow">
                    <li><a class="dropdown-item" th:href="@{/logout}">Sign out</a></li>
                </ul>
            </div>
        </div>
    </div>

</div>

</body>
</html>
