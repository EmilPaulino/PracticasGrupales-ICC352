<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrarse</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/login.css">
</head>

<body>

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow-lg login-card">

        <div class="card-body p-4">

            <h3 class="text-center login-title mb-4">
                Registrarse
            </h3>

            <form method="post" action="/registrarse" enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label">Foto de Perfil</label>
                    <br>
                    <input type="file" name="foto" accept="image/*">
                </div>

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="nombre" class="form-control" placeholder="Jane Doe" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="jdoe@mail.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button class="btn btn-primary w-100 btn-login">
                    Registrarse
                </button>

                <div class="mt-3 mb-3 text-center">
                    <p>¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a> </p>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
