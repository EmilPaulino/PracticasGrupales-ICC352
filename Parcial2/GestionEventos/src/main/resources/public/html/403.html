<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>403 - Acceso denegado</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f8f9fa;
        }

        .error-container{
            min-height:100vh;
        }

        .error-code{
            font-size:120px;
            font-weight:700;
        }

        .card{
            border:none;
            border-radius:15px;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center error-container">

    <div class="card shadow-lg p-5 text-center col-md-6">

        <h1 class="error-code text-danger">403</h1>

        <h3 class="mb-3">Acceso denegado</h3>

        <p class="text-muted">
            No tienes permisos para acceder a esta página.
        </p>

        <div class="mt-4">

            <a href="/" class="btn btn-primary me-2">
                Ir al inicio
            </a>

        </div>

    </div>

</div>

</body>
</html>
