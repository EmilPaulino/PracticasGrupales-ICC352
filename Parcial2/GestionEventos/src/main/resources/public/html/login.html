<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/login.css">
</head>

<body>

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow-lg login-card">

        <div class="card-body p-4">

            <h3 class="text-center login-title mb-4">
                Iniciar Sesión
            </h3>

            <div th:if="${error}" class="alert alert-danger mt-3 text-center p-2">
                Credenciales incorrectas
            </div>

            <div th:if="${bloqueado}" class="alert alert-warning mt-3 text-center p-2">
                Tu cuenta está bloqueada. Contacta al administrador.
            </div>

            <form method="post" action="/procesarLogin">

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email"
                           name="email"
                           class="form-control"
                           placeholder="correo@ejemplo.com"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="••••••••"
                           required>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input"
                           type="checkbox"
                           name="remember"
                           id="remember">
                    <label class="form-check-label" for="remember">
                        Recuérdame
                    </label>
                </div>

                <button class="btn btn-primary w-100 btn-login">
                    Iniciar sesión
                </button>

                <div class="mt-3 mb-3 text-center">
                    <p>¿No tienes cuenta? <a href="/registrarse">Regístrate aquí</a> </p>
                </div>

            </form>



        </div>

    </div>

</div>

</body>
</html>
