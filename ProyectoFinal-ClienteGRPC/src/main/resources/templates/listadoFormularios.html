<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Formularios</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="min-vh-100 py-5">

    <div class="container"
         style="max-width: 860px;">

        <div class="d-flex align-items-center justify-content-between mb-4">

            <div>

                <h4 class="fw-semibold mb-0">
                    Formularios
                </h4>

                <p class="text-muted mb-0"
                   style="font-size:13px;">
                    Lista de formularios registrados
                </p>

            </div>

            <div class="d-flex gap-2">

                <a href="/formularios/crear"
                   class="btn btn-dark rounded-3 fw-medium">

                    <i class="bi bi-plus-lg me-2"></i>
                    Nuevo formulario

                </a>

                <a href="/logout"
                   class="btn btn-outline-secondary rounded-3 fw-medium">

                    <i class="bi bi-box-arrow-right me-2"></i>
                    Salir

                </a>

            </div>

        </div>

        <div class="card border-0 shadow-sm rounded-4">

            <!-- Estado vacío -->

            <div th:if="${formularios.isEmpty()}"
                 class="text-center py-5">

                <i class="bi bi-inbox text-secondary"
                   style="font-size:2.5rem;"></i>

                <p class="text-muted mt-2 mb-0"
                   style="font-size:14px;">

                    No se encontraron formularios

                </p>

            </div>

            <!-- Tabla -->

            <div th:if="${!formularios.isEmpty()}">

                <div class="table-responsive">

                    <table class="table table-hover align-middle mb-0"
                           style="font-size:14px;">

                        <thead style="background:#f8f9fa;">

                        <tr>

                            <th class="px-3 py-3 fw-medium text-muted border-0"
                                style="font-size:12px;text-transform:uppercase;letter-spacing:.05em;">
                                Nombre
                            </th>

                            <th class="px-3 py-3 fw-medium text-muted border-0"
                                style="font-size:12px;text-transform:uppercase;letter-spacing:.05em;">
                                Sector
                            </th>

                            <th class="px-3 py-3 fw-medium text-muted border-0"
                                style="font-size:12px;text-transform:uppercase;letter-spacing:.05em;">
                                Nivel escolar
                            </th>

                            <th class="px-3 py-3 fw-medium text-muted border-0"
                                style="font-size:12px;text-transform:uppercase;letter-spacing:.05em;">
                                Foto
                            </th>

                        </tr>

                        </thead>

                        <tbody>

                        <tr th:each="f : ${formularios}">

                            <td class="px-3 fw-medium"
                                th:text="${f.nombre}">
                            </td>

                            <td class="px-3 text-muted"
                                th:text="${f.sector}">
                            </td>

                            <td class="px-3 text-muted"
                                th:text="${f.nivelEscolar}">
                            </td>

                            <td class="px-3">

                                <img th:if="${f.imagenBase64 != ''}"
                                     th:src="${f.imagenBase64}"
                                     alt="foto"
                                     style="width:36px;height:36px;object-fit:cover;border-radius:8px;cursor:pointer;border:1px solid #dee2e6;"
                                     th:attr="onclick=|verFoto('${f.imagenBase64}','${f.nombre}')|">

                                <span th:if="${f.imagenBase64 == ''}"
                                      class="text-muted"
                                      style="font-size:12px;">

—

</span>

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

                <div class="d-flex align-items-center justify-content-between px-4 py-3 border-top border-light-subtle">

<span class="text-muted"
      style="font-size:13px;">

    Mostrando

    <span th:text="${#numbers.formatInteger((paginaActual - 1) * size + 1, 0)}"></span>

    –

    <span th:text="${#numbers.formatInteger(
    ((paginaActual - 1) * size + formularios.size()) > total
    ? total
    : (paginaActual - 1) * size + formularios.size(),
    0)}"></span>

    de

    <span th:text="${total}"></span>

</span>

                    <nav th:if="${totalPaginas > 1}">

                        <ul class="pagination pagination-sm mb-0 gap-1">

                            <li class="page-item"
                                th:classappend="${paginaActual==1} ? 'disabled'">

                                <a class="page-link rounded-3 border-0"
                                   th:href="@{/formularios(page=${paginaActual-1})}">

                                    <i class="bi bi-chevron-left"
                                       style="font-size:11px;"></i>

                                </a>

                            </li>

                            <li class="page-item"
                                th:each="p : ${#numbers.sequence(1,totalPaginas)}">

                                <a class="page-link rounded-3 border-0"
                                   th:classappend="${p==paginaActual}? 'bg-dark text-white'"
                                   th:href="@{/formularios(page=${p})}"
                                   th:text="${p}">
                                </a>

                            </li>

                            <li class="page-item"
                                th:classappend="${paginaActual==totalPaginas} ? 'disabled'">

                                <a class="page-link rounded-3 border-0"
                                   th:href="@{/formularios(page=${paginaActual+1})}">

                                    <i class="bi bi-chevron-right"
                                       style="font-size:11px;"></i>

                                </a>

                            </li>

                        </ul>

                    </nav>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Modal -->

<div class="modal fade"
     id="modalFoto"
     tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content border-0 rounded-4 shadow">

            <div class="modal-header border-0 pb-0">

                <h6 class="modal-title fw-semibold"
                    id="modalFotoNombre">
                </h6>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body text-center pt-2">

                <img id="modalFotoImg"
                     src=""
                     alt="foto"
                     style="max-width:100%;max-height:400px;border-radius:10px;object-fit:contain;">

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

    function verFoto(src,nombre){

        document.getElementById("modalFotoImg").src=src;

        document.getElementById("modalFotoNombre").textContent=nombre;

        new bootstrap.Modal(document.getElementById("modalFoto")).show();

    }

</script>

</body>

</html>
