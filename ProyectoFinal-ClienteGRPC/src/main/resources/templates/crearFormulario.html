<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Crear Formulario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="min-vh-100 d-flex align-items-center justify-content-center py-5">

    <div class="container"
         style="max-width:540px;">

        <div class="card border-0 shadow-sm rounded-4">

            <div class="card-header bg-white border-bottom border-light-subtle rounded-top-4 py-3 px-4">

                <div class="d-flex align-items-center gap-2">

                    <a th:href="@{/formularios}"
                       class="btn btn-sm btn-light border rounded-3 me-1">

                        <i class="bi bi-arrow-left"></i>

                    </a>

                    <div>

                        <h5 class="mb-0 fw-semibold">
                            Nuevo formulario
                        </h5>

                        <p class="mb-0 text-muted"
                           style="font-size:13px;">

                            Completa los campos para registrar

                        </p>

                    </div>

                </div>

            </div>

            <div class="card-body px-4 py-4">

                <!-- MENSAJE -->

                <div th:if="${mensaje}"
                     class="alert alert-success rounded-3 mb-3">

                    <span th:text="${mensaje}"></span>

                </div>

                <!-- FORM -->

                <form method="post"
                      th:action="@{/formularios}"
                      id="formEncuesta">

                    <!-- NOMBRE -->

                    <div class="mb-3">

                        <label class="form-label fw-medium"
                               style="font-size:14px;">

                            Nombre

                        </label>

                        <input type="text"
                               name="nombre"
                               id="nombre"
                               class="form-control rounded-3"
                               required>

                    </div>

                    <!-- SECTOR -->

                    <div class="mb-3">

                        <label class="form-label fw-medium"
                               style="font-size:14px;">

                            Sector

                        </label>

                        <input type="text"
                               name="sector"
                               id="sector"
                               class="form-control rounded-3"
                               required>

                    </div>

                    <!-- NIVEL -->

                    <div class="mb-3">

                        <label class="form-label fw-medium"
                               style="font-size:14px;">

                            Nivel escolar

                        </label>

                        <select name="nivelEscolar"
                                id="nivelEscolar"
                                class="form-select rounded-3">

                            <option value="BASICO">
                                Básico
                            </option>

                            <option value="MEDIO">
                                Medio
                            </option>

                            <option value="GRADO_UNIVERSITARIO">
                                Grado universitario
                            </option>

                            <option value="POSTGRADO">
                                Postgrado
                            </option>

                            <option value="DOCTORADO">
                                Doctorado
                            </option>

                        </select>

                    </div>

                    <!-- FOTO -->

                    <div class="mb-4">

                        <label class="form-label fw-medium"
                               style="font-size:14px;">

                            Foto

                        </label>

                        <div class="border rounded-3 p-3 text-center">

                            <div style="max-width:300px;margin:auto;">

                                <video id="video"
                                       class="w-100 rounded mb-2"
                                       style="display:none;"
                                       playsinline>
                                </video>

                                <img id="preview"
                                     class="img-fluid rounded mb-2"
                                     style="display:none;">

                            </div>

                            <div class="d-flex justify-content-center gap-2 flex-wrap">

                                <button type="button"
                                        class="btn btn-outline-dark btn-sm"
                                        onclick="activarCamara()">

                                    <i class="bi bi-camera-video"></i>
                                    Iniciar

                                </button>

                                <button type="button"
                                        class="btn btn-outline-danger btn-sm"
                                        onclick="desactivarCamara()">

                                    <i class="bi bi-power"></i>
                                    Apagar

                                </button>

                                <button type="button"
                                        class="btn btn-dark btn-sm"
                                        onclick="tomarFoto()">

                                    <i class="bi bi-camera"></i>
                                    Capturar

                                </button>

                            </div>

                            <canvas id="canvas"
                                    style="display:none;">
                            </canvas>

                        </div>

                    </div>

                    <!-- HIDDEN -->

                    <input type="hidden"
                           name="fotoBase64"
                           id="fotoBase64">

                    <input type="hidden"
                           name="latitud"
                           id="latitud">

                    <input type="hidden"
                           name="longitud"
                           id="longitud">

                    <!-- BOTONES -->

                    <div class="d-grid gap-2">

                        <button type="submit"
                                class="btn btn-dark rounded-3 fw-medium">

                            <i class="bi bi-floppy me-2"></i>
                            Guardar formulario

                        </button>

                        <a th:href="@{/formularios}"
                           class="btn btn-outline-secondary rounded-3 fw-medium">

                            <i class="bi bi-x-lg me-2"></i>
                            Cancelar

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

    let fotoBase64 = "";
    let stream = null;

    function activarCamara() {

        if (stream) return;

        preview.style.display = "none";

        navigator.mediaDevices
            .getUserMedia({ video: true })
            .then(s => {

                stream = s;

                video.srcObject = s;

                video.style.display = "block";

                video.play();

            });

    }

    function desactivarCamara() {

        if (stream) {

            stream.getTracks().forEach(t => t.stop());

            stream = null;

        }

        video.style.display = "none";

    }

    function tomarFoto() {

        if (!stream) {

            alert("Primero activa la cámara");

            return;

        }

        canvas.width = video.videoWidth;

        canvas.height = video.videoHeight;

        canvas
            .getContext("2d")
            .drawImage(video, 0, 0);

        fotoBase64 =
            canvas.toDataURL("image/png");

        preview.src = fotoBase64;

        preview.style.display = "block";

        document.getElementById("fotoBase64").value =
            fotoBase64;

        desactivarCamara();

    }

    document
        .getElementById("formEncuesta")
        .addEventListener("submit", e => {

            e.preventDefault();

            navigator.geolocation
                .getCurrentPosition(pos => {

                    document.getElementById("latitud").value =
                        pos.coords.latitude;

                    document.getElementById("longitud").value =
                        pos.coords.longitude;

                    e.target.submit();

                });

        });

</script>

</body>

</html>
